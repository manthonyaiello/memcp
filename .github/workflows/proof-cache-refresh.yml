name: Proof cache refresh

# Daily COLD reprove of main. Two purposes:
#   1. Refresh the shared GNATprove file cache that the CI `prove` job restores.
#   2. Poison guard: a cold run (empty cache) re-runs every prover from scratch,
#      so no corrupt/poisoned cached verdict can survive it. The cache the whole
#      team trusts is therefore re-grounded in a full proof at least daily.
#
# The reprove itself is delegated to the reusable prove workflow that ci.yml also
# calls (purge + no-restore + save = the cold variant). The only piece unique to
# this workflow is the guard below: skip unless main actually moved in the last
# 24h. That is sound because the cache is content-addressed by VC — identical
# main sources (same SHAs) yield identical VC keys, so the existing cache is
# already valid and a cold reprove would only burn ~23 min of CI to reproduce it.
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:       # manual trigger for ad-hoc refresh / testing

# actions:write is granted here so the reusable workflow's purge step (gh cache
# delete) works when called from this workflow.
permissions:
  contents: read
  actions: write

jobs:
  # Cheap gate: did main move in the last 24h? Emits run=true/false.
  guard:
    name: Check main moved in 24h
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Checkout main (full history for the time window)
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Decide
        id: check
        run: |
          # HEAD is main (checked out above). Any commit in the window ⇒ run.
          if [ -n "$(git log --since='24 hours ago' --format=%H HEAD)" ]; then
            echo "main moved in the last 24h — cold reprove will run."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "main unchanged in the last 24h — existing cache still valid, skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  # Cold refresh: purge every gnatprove-* cache, prove from an empty dir (no
  # restore), then save the freshly-populated cache under main's key.
  refresh:
    name: Cold reprove + cache refresh (main)
    needs: guard
    if: needs.guard.outputs.run == 'true'
    uses: ./.github/workflows/prove.yml
    with:
      purge: true
      restore: false
      save: true
