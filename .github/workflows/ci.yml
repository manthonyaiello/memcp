name: CI

# Build + test on Linux (x86_64) and macOS (arm64); prove on Linux only.
# Proof runs as its own job, in parallel with build/test: it depends on
# compilation but not on a successful test run (see issue #3).
# Doc-only changes are skipped.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LAYOUT.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LAYOUT.md'
  workflow_dispatch:

# Cancel an in-flight run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test across both platforms. This no longer runs proof — proof is a
  # sibling job below with no `needs:` edge, so the two run concurrently.
  build-test:
    name: Build + test (${{ matrix.os }})
    strategy:
      # Don't let one platform's failure cancel the other — we want both signals.
      fail-fast: false
      matrix:
        # ubuntu-latest = x86_64 Linux; macos-latest = arm64 macOS (Apple
        # Silicon), which matches the dev machine's arch and exercises the
        # macOS-only linker path (-liconv) in candle_spark.gpr.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # alire.toml git-pins json to a fixed json-spark commit, so `alr build`
      # fetches it automatically — no sibling checkout needed. Checkout must run
      # before the local composite action can be resolved.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Alire toolchain
        uses: ./.github/actions/setup-alire

      # cargo (pre-installed on both runners) drives the candle + tiny_http
      # staticlib pre-builds and fetch-deps.sh vendors the pinned SQLite sources.
      - name: Build
        run: make build

      - name: Test
        run: make test

  # Prove to Silver on Linux only: GNATprove reasons about source semantics, not
  # the target, so the verification result is platform-independent — one run
  # suffices. Runs in parallel with build-test (no `needs:`): proof depends on
  # compilation, not on a passing test run (issue #3). The gate fails on any
  # unproved check in our code; GNATprove 16 discharges the SPARKlib float
  # lemmas, so the allowlist (scripts/proof-xfail.txt) is currently empty.
  prove:
    name: Prove (SPARK Silver, Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Alire toolchain
        uses: ./.github/actions/setup-alire

      # sparklib 16.1.0 forbids gnatprove < 16; install 16.x and put it on PATH.
      - name: Install GNATprove
        run: |
          alr -n install gnatprove^16
          echo "$HOME/.alire/bin" >> "$GITHUB_PATH"

      # Proof depends on compilation: `make build` runs the cargo staticlib
      # pre-builds and vendors the pinned SQLite sources that gnatprove needs on
      # disk. It does NOT depend on `make test`.
      - name: Build
        run: make build

      # Restore the shared GNATprove proof cache. The key fingerprints the exact
      # prover toolchain (gnatprove 16.1.0 / why3 1.8.2): a bump changes every VC
      # key, so a cache can never carry stale verdicts across a toolchain change.
      # The github.sha suffix makes each publish a distinct key; restore-keys
      # falls back to the newest cache under the fingerprint prefix, so a PR
      # warm-starts from whatever `main` last published. RESTORE ONLY here — the
      # save step below is gated to main, so a branch or fork PR can read the
      # cache but never write it, and thus cannot poison what main trusts.
      - name: Restore proof cache
        uses: actions/cache/restore@v4
        with:
          path: .gnatprove-cache
          key: gnatprove-${{ runner.os }}-gp16.1.0-why3-1.8.2-${{ github.sha }}
          restore-keys: |
            gnatprove-${{ runner.os }}-gp16.1.0-why3-1.8.2-

      # --timeout=10 via GNATPROVE_EXTRA: --level timeouts are wall-clock, so a
      # check can need more time on the slower runner than on a dev machine.
      # --memcached-server=file: points gnatprove at the restored cache;
      # check-proof.sh appends GNATPROVE_EXTRA verbatim, so this stays a
      # workflow-only change. mkdir -p because gnatprove wants the dir to exist
      # (a cache miss leaves it absent).
      - name: Prove
        env:
          GNATPROVE_EXTRA: >-
            --timeout=10
            --memcached-server=file:${{ github.workspace }}/.gnatprove-cache
        run: |
          mkdir -p .gnatprove-cache
          make prove-check

      # Publish the warmed cache ONLY from pushes to main (the on: push above
      # guarantees this run exists). PRs skip this step, so the cache main trusts
      # is only ever written by main itself and the daily cold refresh.
      - name: Save proof cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: .gnatprove-cache
          key: gnatprove-${{ runner.os }}-gp16.1.0-why3-1.8.2-${{ github.sha }}
