#  The SQLite + sqlite-vec C sources are code the build needs (like candle's
#  Rust), not runtime data -- so vendor them before the Ada compiles. The script
#  is sha256-pinned and idempotent: a no-op once csrc/ is populated, so this only
#  hits the network on a fresh checkout.
[[actions]]
type = "pre-build"
command = ["bash", "scripts/fetch-deps.sh"]
